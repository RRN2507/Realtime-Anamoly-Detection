services:
  - type: web
    name: realtime-anomaly-detection-demo
    runtime: python
    plan: free
    buildCommand: pip install -r demo/requirements.txt
    startCommand: cd demo && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
